name: Fetch Zakázky

on:
  schedule:
    - cron: '0 * * * *'   # každou hodinu
  workflow_dispatch:        # ruční spuštění

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch RSS feeds
        run: python fetch_webtrh.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/webtrh.json
          git diff --staged --quiet || git commit -m "update: zakázky $(date +'%Y-%m-%d %H:%M')"
          git push
